# --- DATASOURCE CONFIG ---
# Using Transaction Mode (6543) to allow more concurrent users/apps without hitting Supabase limits.
# prepareThreshold=0 is mandatory for transaction mode to prevent prepared statement errors.
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:5432/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.tjjtglvvjvzckccxtmny
spring.datasource.password=2gkqFzJ0zvsU5d7y
spring.datasource.driver-class-name=org.postgresql.Driver

# --- HIKARI CONNECTION POOL ---
# Supabase Free Tier has strict limits. Reducing to 3 helps avoid "pool is full" errors.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
# Increase timeout because Sydney (ap-southeast-2) is far from the Philippines
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# --- JPA / HIBERNATE ---
# Keep 'update' while we are still adding the Transaction entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Shuts off the "open-in-view" warning in your console
spring.jpa.open-in-view=false
# Helps Hibernate understand the Postgres version
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- LOGGING ---
# Useful if you want to see exactly why a connection is slow
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE